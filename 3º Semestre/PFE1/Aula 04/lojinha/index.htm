<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Lojinha</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">TechStore</div>
        <ul class="links">
            <li>Nome</li>
            <li>Produtos</li>
        </ul>
        
    </nav>
    <header class="ofertas">
        <h1>As melhores ofertas!</h1>
    </header>
    <main class="container">
        <div class="grid-produtos">
            <div class="card">
                <img src="https://samsungbrshop.vtexassets.com/arquivos/ids/278618-1000-auto?v=639076209419430000&width=1000&height=auto&aspect=true" alt="Produto 1">
                <h3>Smartphone Samsung S26</h3>
                <p>R$5.000,00</p>
                <button class="btn-comprar">Comprar</button>
            </div>
            <div class="card">
                <img src="https://down-br.img.susercontent.com/file/br-11134207-7r98o-lr7qdiah4zln28" alt="Produto 2">
                <h3>Playstation 5</h3>
                <p>R$4.000,00</p>
                <button class="btn-comprar">Comprar</button>
            </div>
        </div>
    </main>
</body>
</html>
