<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locadora</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
        rel="stylesheet">
</head>

<body class="bg-indigo">
    <nav class="navbar navbar-expand-lg" style="background: #deceef">
        <div class="container">
            <a class="navbar-brand" href="#">MovieLoc — Locadora</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="#">Home</a>
                <a class="nav-link" href="#" onclick="abrirModal()">Cadastrar Filmes</a>
            </div>
        </div>
    </nav>


    <header class="bg-dark text-white text-center py-5 mb-4">
        <div class="container">
            <h1>Filmes</h1>
        </div>
    </header>


    <main class="container">
        <!--========= FILTRO =========-->
        <div class="row row-cols-2 row-cols-lg-5 g-2 g-lg-3 mb-4">
            <button class="btn btn-outline-dark" onclick="filtrar('Ação')">Ação</button>
            <button class="btn btn-outline-dark" onclick="filtrar('Aventura')">Aventura</button>
            <button class="btn btn-outline-dark" onclick="filtrar('Animação')">Animação</button>
            <button class="btn btn-outline-dark" onclick="filtrar('Comédia')">Comédia</button>
            <button class="btn btn-outline-dark" onclick="filtrar('Documentário')">Documentário</button>
            <button class="btn btn-outline-dark" onclick="filtrar('Drama')">Drama</button>
            <button class="btn btn-outline-dark" onclick="filtrar('Fantasia')">Fantasia</button>
            <button class="btn btn-outline-dark" onclick="filtrar('Ficção')">Ficção</button>
            <button class="btn btn-outline-dark" onclick="filtrar('Musical')">Musical</button>
            <button class="btn btn-outline-dark" onclick="filtrar('Policial')">Policial</button>
            <button class="btn btn-outline-dark" onclick="filtrar('Romance')">Romance</button>
            <button class="btn btn-outline-dark" onclick="filtrar('Suspense')">Suspense</button>
            <button class="btn btn-outline-dark" onclick="filtrar('Terror')">Terror</button>
        </div>

        <!--========= CARDS =========-->
        <div class="row row-cols-1 row-cols-md-4 g-4" id="filmes-content">
            <div class="card shadow-sm">
                <img src="https://img.odcdn.com.br/wp-content/uploads/2022/09/spider-man_sem_volta_para_casa.jpg"
                    alt="Produto 1">
                <div class="card-body text-center">
                    <h5 class="card-title">Homem-Aranha: Sem Volta Pra Casa</h5>
                    <p class="card-text">2021</p>
                    <p class="card-text">Ação</p>
                    <p class="card-text">2hr 28min</p>
                    <p class="card-text text-muted">R$20,00</p>
                    <a class="btn btn-secondary w-100" href="#">Comprar</a>
                </div>
            </div>
        </div>
        </div>

        <div class="modal fade" id="filmeModal">
            <div class="modal-dialog">
                <div class="modal-content">

                    <div class="modal-body">
                        <form id="cadFilme">
                            <h2>Cadastrar</h2>

                            <input type="text" id="titulo" name="titulo" placeholder="Título" required>
                            <input type="text" id="ano" name="ano" placeholder="Ano de lançamento" required>
                            <input type="text" id="genero" name="genero" placeholder="Gênero" required>
                            <input type="text" id="duracao" name="duracao" placeholder="Duração" required>
                            <input type="number" id="preco" name="preco" placeholder="Preço" required>
                            <input type="url" id="foto" name="foto" placeholder="URL da foto" required>

                            <div class="modal-buttons">
                                <button type="submit">Salvar</button>
                                <button type="reset" data-bs-dismiss="modal">Cancelar</button>
                            </div>
                        </form>
                    </div>

                </div>
            </div>
        </div>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
        <script src="script.js"></script>
    </main>
</body>

</html>
