<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Previsão do tempo</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
</head>
<body>
    <div class="caixa-maior">
        <input class="input-cidade" placeholder="Digite o nome da cidade">
        <button class="btn-busca" onclick="cliqueBotao()">
            <img class="img-busca" src="https://www.svgrepo.com/show/521826/search.svg" alt="busca" width="20px" height="15px">
        </button>
        <div class="caixa-media">
        <h2 class="cidade">Tempo em São Paulo</h2>
        <p class="tempo">21°C</p>

        <div class="caixa-menor">
            <img class="img-previsao" src="https://openweathermap.org/img/wn/04n.png" alt="previsão">
            <p class="texto-previsao">Nublado</p>
        </div>
        <p class="umidade">Umidade: 70%</p>
    </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
